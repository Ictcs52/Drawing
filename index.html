<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ระบายสีหรรษา 🖍️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=Noto+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3D3562;
    --card:#FFFFFF;
    --pink:#FF6FA5; --sun:#FFC93C; --sky:#4FC3F7; --grape:#9C6FF3; --mint:#5BE0B3;
    --shadow-soft:0 18px 40px -12px rgba(140,110,255,.22);
    --shadow-press:0 6px 0 rgba(61,53,98,.14);
    --r-lg:32px; --r-md:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{margin:0}
  body{
    font-family:'Mali',sans-serif;color:var(--ink);min-height:100vh;
    background:
      radial-gradient(600px 400px at 8% 0%, rgba(255,190,225,.45), transparent 70%),
      radial-gradient(700px 500px at 100% 12%, rgba(180,225,255,.5), transparent 70%),
      radial-gradient(600px 500px at 90% 95%, rgba(190,255,225,.45), transparent 70%),
      radial-gradient(500px 400px at 0% 100%, rgba(225,205,255,.5), transparent 70%),
      linear-gradient(150deg,#FDF7FF,#F2F8FF 55%,#F4FFF9);
    background-attachment:fixed;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:24px clamp(16px,3vw,36px) 60px}

  /* ================= app bar ================= */
  .appbar{display:flex;align-items:center;gap:16px;margin-bottom:22px}
  .logo{
    width:64px;height:64px;border-radius:22px;display:grid;place-items:center;font-size:2rem;
    background:linear-gradient(140deg,#FF9AC0,#9C6FF3);
    box-shadow:0 12px 24px -8px rgba(156,111,243,.45);
    transform:rotate(-6deg);
  }
  .appbar h1{margin:0;font-size:clamp(1.7rem,3.4vw,2.4rem);font-weight:700;line-height:1.1}
  .appbar h1 span{background:linear-gradient(90deg,#FF6FA5,#9C6FF3 55%,#4FC3F7);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .appbar p{margin:2px 0 0;font-family:'Noto Sans Thai',sans-serif;font-size:.95rem;opacity:.65}

  /* ================= category chips ================= */
  .cats{display:flex;gap:12px;overflow-x:auto;padding:6px 2px 16px;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;display:flex;align-items:center;gap:10px;cursor:pointer;
    font-family:'Mali',sans-serif;font-weight:600;font-size:1.1rem;color:var(--ink);
    background:rgba(255,255,255,.75);backdrop-filter:blur(8px);
    border:none;border-radius:999px;padding:8px 22px 8px 8px;
    box-shadow:0 8px 20px -8px rgba(120,100,200,.25);
    transition:transform .2s cubic-bezier(.34,1.56,.64,1), background .2s;
  }
  .chip .ic{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:1.4rem;background:var(--tint,#FFE3F0)}
  .chip.on{background:linear-gradient(120deg,#FF8FB8,#A17BF5);color:#fff;transform:scale(1.06)}
  .chip:active{transform:scale(.95)}

  /* ================= gallery ================= */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:22px}
  .card{
    background:var(--card);border-radius:var(--r-lg);padding:18px 18px 14px;cursor:pointer;
    box-shadow:var(--shadow-soft);text-align:center;position:relative;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .card:hover{transform:translateY(-8px) rotate(-1deg)}
  .card:active{transform:scale(.96)}
  .card svg{width:100%;height:auto;pointer-events:none}
  .card .nm{font-weight:600;font-size:1.2rem;margin-top:6px}
  .card .bar{height:10px;border-radius:99px;background:#F0ECFA;margin-top:8px;overflow:hidden}
  .card .bar i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,#FFC93C,#FF6FA5,#9C6FF3);transition:width .4s}
  .card .badge{position:absolute;top:10px;right:12px;font-size:1.5rem;filter:drop-shadow(0 3px 4px rgba(0,0,0,.15))}

  /* ================= studio ================= */
  #studio{display:none}
  .topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .picname{font-weight:700;font-size:clamp(1.4rem,2.6vw,1.9rem);margin-right:auto}
  .count{font-family:'Noto Sans Thai',sans-serif;font-size:.9rem;background:rgba(255,255,255,.8);
    padding:6px 14px;border-radius:99px;box-shadow:0 6px 16px -8px rgba(120,100,200,.3)}

  .tool{
    display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;
    background:none;font-family:'Mali',sans-serif;color:var(--ink);
  }
  .tool .b{
    width:60px;height:60px;border-radius:20px;display:grid;place-items:center;font-size:1.6rem;
    background:var(--card);box-shadow:var(--shadow-press);
    transition:transform .12s, box-shadow .12s;
  }
  .tool:active .b{transform:translateY(5px);box-shadow:0 1px 0 rgba(61,53,98,.14)}
  .tool small{font-size:.85rem;font-weight:600}
  .tool.back .b{background:#EDE7FF} .tool.undo .b{background:#DFF9EF}
  .tool.clear .b{background:#FFE3EC} .tool.save .b{background:#FFF2C9}

  .studioGrid{display:grid;grid-template-columns:1fr 168px;gap:24px;align-items:start}
  .board{
    position:relative;background:var(--card);border-radius:var(--r-lg);
    box-shadow:var(--shadow-soft);padding:clamp(10px,2vw,22px);
  }
  .board svg{width:100%;height:auto;display:block;touch-action:manipulation;max-height:74vh;margin:0 auto}
  .board svg .r{cursor:pointer;transition:fill .12s}
  @media(hover:hover){.board svg .r:hover{filter:brightness(.93)}}

  /* ================= crayon rack ================= */
  .rack{
    position:sticky;top:16px;background:rgba(255,255,255,.72);backdrop-filter:blur(10px);
    border-radius:var(--r-lg);box-shadow:var(--shadow-soft);padding:18px 12px 14px;
  }
  .rack h3{margin:0 0 4px;text-align:center;font-size:1rem;font-weight:600}
  .rackGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 8px;justify-items:center;padding-top:12px}
  .crayon{
    width:40px;height:66px;border-radius:6px 6px 10px 10px;background:var(--c);
    position:relative;cursor:pointer;margin-top:14px;
    box-shadow:inset -5px 0 0 rgba(0,0,0,.12), 0 5px 10px -4px rgba(61,53,98,.35);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .crayon::before{content:"";position:absolute;left:0;top:-15px;
    border-left:20px solid transparent;border-right:20px solid transparent;border-bottom:16px solid var(--c);
    filter:brightness(1.08)}
  .crayon .band{position:absolute;left:0;right:0;top:16px;height:15px;background:rgba(255,255,255,.5)}
  .crayon.on{transform:translateY(-8px) scale(1.16);
    box-shadow:inset -5px 0 0 rgba(0,0,0,.12), 0 12px 18px -6px rgba(61,53,98,.4),0 0 0 4px #fff,0 0 0 7px var(--c)}
  .eraser{
    width:52px;height:66px;margin-top:14px;border-radius:14px;cursor:pointer;font-size:1.6rem;
    display:grid;place-items:center;
    background:repeating-linear-gradient(45deg,#fff 0 9px,#EFEAF9 9px 18px);
    box-shadow:0 5px 10px -4px rgba(61,53,98,.35);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .eraser.on{transform:translateY(-8px) scale(1.12);box-shadow:0 12px 18px -6px rgba(61,53,98,.4),0 0 0 4px #fff,0 0 0 7px var(--grape)}

  /* ================= effects ================= */
  .pop{position:absolute;font-size:1.6rem;pointer-events:none;animation:pop .75s ease-out forwards}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(.4);opacity:1}
    100%{transform:translate(-50%,-160%) scale(1.5) rotate(20deg);opacity:0}}
  .cheer{
    position:absolute;inset:0;display:grid;place-items:center;border-radius:var(--r-lg);
    background:rgba(255,255,255,.55);backdrop-filter:blur(3px);pointer-events:none;
    animation:cheerIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes cheerIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .cheer .msg{background:linear-gradient(120deg,#FF8FB8,#A17BF5);color:#fff;font-weight:700;
    font-size:clamp(1.6rem,4vw,2.4rem);padding:18px 44px;border-radius:99px;
    box-shadow:0 20px 40px -10px rgba(156,111,243,.55)}

  footer{font-family:'Noto Sans Thai',sans-serif;text-align:center;font-size:.8rem;opacity:.5;margin-top:44px}

  /* ================= fullscreen + tools ================= */
  html,body{overscroll-behavior:none}
  .fsbtn{
    margin-left:auto;width:56px;height:56px;border:none;border-radius:18px;cursor:pointer;
    font-size:1.4rem;color:var(--ink);background:rgba(255,255,255,.85);
    box-shadow:var(--shadow-press);transition:transform .12s;
  }
  .fsbtn:active{transform:translateY(4px);box-shadow:none}
  .rack h3{margin:10px 0 0;text-align:center;font-size:1rem;font-weight:600}
  .toolRow{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:10px 0 2px}
  .tbtn{
    display:flex;flex-direction:column;align-items:center;gap:2px;border:none;cursor:pointer;
    background:#fff;border-radius:16px;padding:8px 9px 6px;
    box-shadow:0 4px 10px -4px rgba(61,53,98,.35);
    font-family:'Mali',sans-serif;color:var(--ink);
    transition:transform .15s cubic-bezier(.34,1.56,.64,1);
  }
  .tbtn span{font-size:1.45rem;line-height:1}
  .tbtn small{font-size:.72rem;font-weight:600}
  .tbtn.on{transform:scale(1.08);background:#F3EDFF;box-shadow:0 0 0 3px #fff,0 0 0 6px var(--grape)}
  .sizeRow{display:flex;justify-content:center;gap:10px;padding:10px 0 2px}
  .sizeBtn{width:44px;height:44px;border:none;border-radius:50%;cursor:pointer;
    background:#fff;box-shadow:0 4px 10px -4px rgba(61,53,98,.35);display:grid;place-items:center;
    transition:transform .15s}
  .sizeBtn i{display:block;border-radius:50%;background:var(--ink)}
  .sizeBtn.s1 i{width:8px;height:8px}.sizeBtn.s2 i{width:16px;height:16px}.sizeBtn.s3 i{width:26px;height:26px}
  .sizeBtn.on{transform:scale(1.1);box-shadow:0 0 0 3px #fff,0 0 0 6px var(--grape)}
  .paintWrap{position:relative;aspect-ratio:1/1;max-height:74vh;max-width:74vh;margin:0 auto;touch-action:none}
  .paintWrap svg{position:absolute;inset:0;width:100%;height:100%;max-height:none}
  .paintWrap canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;border-radius:18px}
  .paintWrap svg.lineart{pointer-events:none}

  /* ================= responsive ================= */
  @media (max-width:840px){
    .studioGrid{grid-template-columns:1fr}
    .rack{position:sticky;bottom:10px;top:auto;order:2}
    .rackGrid{display:flex;overflow-x:auto;gap:10px;padding:12px 4px 4px;scrollbar-width:none}
    .rackGrid::-webkit-scrollbar{display:none}
    .crayon{flex:0 0 auto}.eraser{flex:0 0 auto}
  }
  @media (max-width:520px){
    .grid{grid-template-columns:repeat(2,1fr);gap:14px}
    .card{padding:12px 12px 10px}
    .tool .b{width:52px;height:52px;font-size:1.35rem}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header class="appbar">
    <div class="logo">🎨</div>
    <div>
      <h1><span>ระบายสีหรรษา</span></h1>
      <p>เลือกภาพที่ชอบ แตะสีเทียน แล้วระบายเลย!</p>
    </div>
    <button class="fsbtn" id="fsBtn" title="ขยายเต็มจอ">⛶</button>
  </header>

  <nav class="cats" id="cats"></nav>

  <main>
    <section id="gallery" class="grid"></section>

    <section id="studio">
      <div class="topbar">
        <button class="tool back" id="backBtn"><span class="b">🏠</span><small>กลับ</small></button>
        <span class="picname" id="picTitle"></span>
        <span class="count" id="countLbl"></span>
        <button class="tool undo" id="undoBtn"><span class="b">↩️</span><small>ย้อน</small></button>
        <button class="tool clear" id="clearBtn"><span class="b">🧽</span><small>ล้างภาพ</small></button>
        <button class="tool save" id="saveBtn"><span class="b">💾</span><small>บันทึก</small></button>
      </div>

      <div class="studioGrid">
        <div class="board" id="board"></div>
        <aside class="rack">
          <h3>🧰 เครื่องมือ</h3>
          <div class="toolRow">
            <button class="tbtn on" data-tool="bucket"><span>🪣</span><small>ถังสี</small></button>
            <button class="tbtn" data-tool="brush"><span>🖌️</span><small>พู่กัน</small></button>
            <button class="tbtn" data-tool="pencil"><span>✏️</span><small>ดินสอ</small></button>
            <button class="tbtn" data-tool="eraser"><span>🧼</span><small>ยางลบ</small></button>
          </div>
          <div class="sizes" id="brushSizes" style="display:none">
            <h3>ขนาดหัวพู่กัน</h3>
            <div class="sizeRow">
              <button class="sizeBtn s1" data-size="6"><i></i></button>
              <button class="sizeBtn s2 on" data-size="14"><i></i></button>
              <button class="sizeBtn s3" data-size="26"><i></i></button>
            </div>
          </div>
          <h3>🖍️ สีเทียน</h3>
          <div class="rackGrid" id="palette"></div>
        </aside>
      </div>
    </section>
  </main>

  <footer>ทำด้วย ❤️ สำหรับหนูน้อยนักระบายสี</footer>
</div>

const CATS = [
  {id:"all", name:"ทั้งหมด", emoji:"⭐", tint:"#FFF3C9"},
  {id:"princess", name:"เจ้าหญิง", emoji:"👑", tint:"#FFE3F0"},
  {id:"animal", name:"สัตว์", emoji:"🐱", tint:"#FFEede"},
  {id:"nature", name:"ธรรมชาติ", emoji:"🌈", tint:"#E0F7EC"},
  {id:"vehicle", name:"ยานพาหนะ", emoji:"🚗", tint:"#E3F0FF"}
];

const COLORS = ["#FF6B6B","#FFA94D","#FFD43B","#A9E34B","#51CF66","#63E6BE","#3BC9DB","#4DABF7",
                "#5C7CFA","#845EF7","#BE4BDB","#F06595","#FFC9DE","#F8CBA6","#A9714B","#868E96",
                "#343A40","#FFF3BF"];

/* ================= สถานะ ================= */
const fills = {};        // fills[picId] = { regionIndex: color }  (สีจากถังสี)
const strokes = {};      // strokes[picId] = [{color,size,erase,pts}] (เส้นพู่กัน/ดินสอ)
const totals = {};
let currentPic = null, currentColor = COLORS[0], currentTool = "bucket", brushSize = 14;
let ctx = null, drawing = false, curStroke = null, regionEls = [], cheered = false;
const undoStack = [];

PICS.forEach(p => totals[p.id] = (p.svg.match(/class="r"/g)||[]).length);

/* ================= หมวดหมู่ ================= */
const catsEl = document.getElementById("cats");
CATS.forEach((c,i)=>{
  const b = document.createElement("button");
  b.className = "chip" + (i===0?" on":"");
  b.innerHTML = `<span class="ic" style="--tint:${c.tint}">${c.emoji}</span>${c.name}`;
  b.onclick = ()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    renderGallery(c.id);
    showGallery(false);
  };
  catsEl.appendChild(b);
});
const activeCat = ()=> CATS[[...catsEl.children].indexOf(document.querySelector(".chip.on"))].id;

/* ================= แกลเลอรี ================= */
const galleryEl = document.getElementById("gallery");
function renderGallery(cat){
  galleryEl.innerHTML = "";
  PICS.filter(p=>cat==="all"||p.cat===cat).forEach(p=>{
    const n = Object.keys(fills[p.id]||{}).length;
    const pct = Math.round(n/totals[p.id]*100);
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = p.svg
      + `<div class="nm">${p.name}</div>`
      + `<div class="bar"><i style="width:${pct}%"></i></div>`
      + (pct>=100 ? `<span class="badge">🌟</span>` : "");
    applyFills(card.querySelector("svg"), p.id);
    card.onclick = ()=>openPic(p);
    galleryEl.appendChild(card);
  });
}
function applyFills(svg, id){
  const map = fills[id]||{};
  svg.querySelectorAll(".r").forEach((el,i)=>{ if(map[i]) el.setAttribute("fill", map[i]); });
}

/* ================= ห้องระบายสี ================= */
const studio = document.getElementById("studio");
const boardEl = document.getElementById("board");
const countLbl = document.getElementById("countLbl");

function openPic(p){
  currentPic = p; cheered = false;
  undoStack.length = 0;
  document.getElementById("picTitle").textContent = p.name;

  /* ชั้นล่าง: ภาพที่เทสีได้ / ชั้นกลาง: แคนวาสพู่กัน / ชั้นบน: เส้นโครงคมชัด */
  boardEl.innerHTML = `<div class="paintWrap">${p.svg}<canvas width="900" height="900"></canvas>${p.svg}</div>`;
  const wrap = boardEl.querySelector(".paintWrap");
  const svgs = wrap.querySelectorAll("svg");
  const base = svgs[0], top = svgs[1];
  top.classList.add("lineart");
  top.querySelectorAll(".r").forEach(el=>{ el.setAttribute("fill","none"); el.classList.remove("r"); });

  applyFills(base, p.id);
  regionEls = [...base.querySelectorAll(".r")];
  ctx = wrap.querySelector("canvas").getContext("2d");
  strokes[p.id] = strokes[p.id] || [];
  redraw();
  bindPointer(wrap);
  updateCount();

  galleryEl.style.display = "none";
  studio.style.display = "block";
  window.scrollTo({top:0, behavior:"smooth"});
}
function showGallery(rerender=true){
  studio.style.display = "none";
  galleryEl.style.display = "grid";
  if(rerender) renderGallery(activeCat());
}
document.getElementById("backBtn").onclick = ()=>showGallery();

function updateCount(){
  const n = Object.keys(fills[currentPic.id]||{}).length;
  countLbl.textContent = `ระบายแล้ว ${n}/${totals[currentPic.id]} ส่วน`;
  if(n >= totals[currentPic.id] && !cheered){ cheered = true; celebrate(); }
}

/* ================= เครื่องมือทั้ง 4 ================= */
function bindPointer(wrap){
  const cv = ctx.canvas;
  const pos = (ev)=>{
    const r = wrap.getBoundingClientRect();
    return { x:(ev.clientX-r.left)/r.width*cv.width, y:(ev.clientY-r.top)/r.height*cv.height };
  };
  let startTarget = null, moved = 0, last = null;

  wrap.addEventListener("pointerdown", (ev)=>{
    ev.preventDefault();
    startTarget = ev.target; moved = 0;

    /* 🪣 ถังสี: กดครั้งเดียว เทสีทั้งส่วน */
    if(currentTool === "bucket"){
      if(ev.target.classList && ev.target.classList.contains("r")) fillRegion(ev.target, ev);
      return;
    }

    /* 🖌️ พู่กัน / ✏️ ดินสอ / 🧼 ยางลบ: ลากเป็นเส้น */
    wrap.setPointerCapture(ev.pointerId);
    drawing = true;
    last = pos(ev);
    curStroke = {
      color: currentColor,
      size: currentTool === "pencil" ? 4 : brushSize,
      erase: currentTool === "eraser",
      pts: [last]
    };
    strokes[currentPic.id].push(curStroke);
    undoStack.push({type:"stroke"});
    drawSeg(curStroke, last, last);
  });

  wrap.addEventListener("pointermove", (ev)=>{
    if(!drawing) return;
    const p2 = pos(ev);
    moved += Math.abs(p2.x-last.x) + Math.abs(p2.y-last.y);
    curStroke.pts.push(p2);
    drawSeg(curStroke, last, p2);
    last = p2;
  });

  const end = ()=>{
    /* 🧼 แตะเบาๆ ด้วยยางลบบนส่วนที่เทสีไว้ = ล้างสีส่วนนั้น */
    if(drawing && currentTool === "eraser" && moved < 10
       && startTarget && startTarget.classList && startTarget.classList.contains("r")){
      const i = regionEls.indexOf(startTarget);
      const id = currentPic.id;
      if(i > -1 && fills[id] && fills[id][i]){
        undoStack.push({type:"fill", i, prev:fills[id][i]});
        delete fills[id][i];
        startTarget.setAttribute("fill","#fff");
        updateCount();
      }
    }
    drawing = false; curStroke = null;
  };
  wrap.addEventListener("pointerup", end);
  wrap.addEventListener("pointercancel", end);
}

function fillRegion(el, ev){
  const id = currentPic.id;
  fills[id] = fills[id]||{};
  const i = regionEls.indexOf(el);
  const prev = fills[id][i] || null;
  if(prev === currentColor) return;
  undoStack.push({type:"fill", i, prev});
  fills[id][i] = currentColor;
  el.setAttribute("fill", currentColor);
  sparkle(ev);
  updateCount();
}

function drawSeg(st, p1, p2){
  ctx.globalCompositeOperation = st.erase ? "destination-out" : "source-over";
  ctx.strokeStyle = st.color;
  ctx.lineWidth = st.size * 2.4;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
}
function redraw(){
  if(!ctx) return;
  const cv = ctx.canvas;
  ctx.globalCompositeOperation = "source-over";
  ctx.clearRect(0,0,cv.width,cv.height);
  (strokes[currentPic.id]||[]).forEach(st=>{
    if(st.pts.length === 1) drawSeg(st, st.pts[0], st.pts[0]);
    for(let i=1;i<st.pts.length;i++) drawSeg(st, st.pts[i-1], st.pts[i]);
  });
}

/* ปุ่มเลือกเครื่องมือ */
document.querySelectorAll(".tbtn").forEach(b=>{
  b.onclick = ()=>{
    currentTool = b.dataset.tool;
    document.querySelectorAll(".tbtn").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");

      (currentTool === "brush" || currentTool === "eraser") ? "block" : "none";
  };
});
/* ปุ่มขนาดหัวพู่กัน */
document.querySelectorAll(".sizeBtn").forEach(b=>{
  b.onclick = ()=>{
    brushSize = +b.dataset.size;
    document.querySelectorAll(".sizeBtn").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
  };
});

/* ================= เอฟเฟกต์ ================= */
function sparkle(ev){
  const rect = boardEl.getBoundingClientRect();
  const s = document.createElement("span");
  s.className = "pop";
  s.textContent = ["✨","⭐","💖","🌟","🎈"][Math.floor(Math.random()*5)];
  s.style.left = (ev.clientX-rect.left)+"px";
  s.style.top = (ev.clientY-rect.top)+"px";
  boardEl.appendChild(s);
  setTimeout(()=>s.remove(), 750);
}
function celebrate(){
  const c = document.createElement("div");
  c.className = "cheer";
  c.innerHTML = `<div class="msg">🎉 เก่งมากเลย!</div>`;
  boardEl.appendChild(c);
  for(let k=0;k<18;k++){
    setTimeout(()=>{
      const s = document.createElement("span");
      s.className = "pop";
      s.textContent = ["🎉","⭐","💖","🌈","✨","🎈"][k%6];
      s.style.left = (10+Math.random()*80)+"%";
      s.style.top = (15+Math.random()*70)+"%";
      boardEl.appendChild(s);
      setTimeout(()=>s.remove(), 750);
    }, k*90);
  }
  setTimeout(()=>c.remove(), 2600);
}

/* ================= ปุ่มด้านบน ================= */
document.getElementById("undoBtn").onclick = ()=>{
  if(!currentPic) return;
  const u = undoStack.pop(); if(!u) return;
  const id = currentPic.id;
  if(u.type === "stroke"){
    (strokes[id]||[]).pop(); redraw();
  } else {
    const el = regionEls[u.i];
    if(u.prev){ fills[id][u.i] = u.prev; el.setAttribute("fill", u.prev); }
    else { delete fills[id][u.i]; el.setAttribute("fill", "#fff"); }
  }
  updateCount();
};
document.getElementById("clearBtn").onclick = ()=>{
  if(!currentPic || !confirm("ล้างสีทั้งภาพนี้เลยนะ?")) return;
  fills[currentPic.id] = {}; strokes[currentPic.id] = [];
  undoStack.length = 0; cheered = false;
  regionEls.forEach(el=>el.setAttribute("fill","#fff"));
  redraw();
  updateCount();
};
document.getElementById("saveBtn").onclick = ()=>{
  const wrap = boardEl.querySelector(".paintWrap");
  const svgs = wrap.querySelectorAll("svg");
  const cv = wrap.querySelector("canvas");
  const s1 = new XMLSerializer().serializeToString(svgs[0]);
  const s2 = new XMLSerializer().serializeToString(svgs[1]);
  const i1 = new Image(), i2 = new Image();
  let loaded = 0;
  const done = ()=>{
    if(++loaded < 2) return;
    const c = document.createElement("canvas"); c.width = c.height = 1200;
    const x = c.getContext("2d");
    x.fillStyle = "#fff"; x.fillRect(0,0,1200,1200);
    x.drawImage(i1,0,0,1200,1200);   /* สีถัง + ภาพ */
    x.drawImage(cv,0,0,1200,1200);   /* เส้นพู่กัน/ดินสอ */
    x.drawImage(i2,0,0,1200,1200);   /* เส้นโครงคมชัดทับบนสุด */
    const a = document.createElement("a");
    a.download = `ระบายสี-${currentPic.name}.png`;
    a.href = c.toDataURL("image/png");
    a.click();
  };
  i1.onload = done; i2.onload = done;
  i1.src = "data:image/svg+xml;charset=utf-8,"+encodeURIComponent(s1);
  i2.src = "data:image/svg+xml;charset=utf-8,"+encodeURIComponent(s2);
};

/* ================= สีเทียน ================= */
const paletteEl = document.getElementById("palette");
COLORS.forEach((c,i)=>{
  const d = document.createElement("div");
  d.className = "crayon" + (i===0?" on":"");
  d.style.setProperty("--c", c);
  d.innerHTML = '<div class="band"></div>';
  d.onclick = ()=>{
    currentColor = c;
    document.querySelectorAll(".crayon").forEach(x=>x.classList.remove("on"));
    d.classList.add("on");
    /* ถ้ากำลังใช้ยางลบอยู่ เลือกสีแล้วสลับกลับเป็นพู่กันให้อัตโนมัติ */
    if(currentTool === "eraser") document.querySelector('.tbtn[data-tool="brush"]').click();
  };
  paletteEl.appendChild(d);
});

/* ================= ขยายเต็มจอ ================= */
const fsBtn = document.getElementById("fsBtn");
fsBtn.onclick = ()=>{
  const doc = document, el = doc.documentElement;
  const active = doc.fullscreenElement || doc.webkitFullscreenElement;
  if(active){
    (doc.exitFullscreen || doc.webkitExitFullscreen).call(doc);
  } else {
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if(req) req.call(el);
    else alert("เบราว์เซอร์นี้ไม่รองรับโหมดเต็มจอ 🙏 แนะนำให้กดปุ่มแชร์ แล้วเลือก \"เพิ่มไปยังหน้าจอโฮม\" จะได้เต็มจอเหมือนแอปครับ");
  }
};
function updFs(){
  const on = document.fullscreenElement || document.webkitFullscreenElement;
  fsBtn.textContent = on ? "✕" : "⛶";
  fsBtn.title = on ? "ออกจากเต็มจอ" : "ขยายเต็มจอ";
}
document.addEventListener("fullscreenchange", updFs);
document.addEventListener("webkitfullscreenchange", updFs);

/* เริ่มต้น */
renderGallery("all");
